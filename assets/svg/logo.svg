    @keyframes innerGlowPulse { 0%,100%{opacity:0.1;r:3;} 50%{opacity:0.5;r:6;} }
    .inner-node { animation: innerPulse 2s ease-in-out infinite; }
    .inner-halo { animation: innerGlowPulse 2s ease-in-out infinite; }
    .in0{animation-delay:0s} .in1{animation-delay:0.25s} .in2{animation-delay:0.5s} .in3{animation-delay:0.75s} .in4{animation-delay:1.0s}
