    .in20{animation-delay:5.0s} .in21{animation-delay:5.25s} .in22{animation-delay:5.5s} .in23{animation-delay:5.75s}
    @keyframes radarSpin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    .radar-group { transform-origin:100px 100px; animation:radarSpin 6s linear infinite; }
    @keyframes ringPulse { 0%,100%{opacity:0.25;stroke-width:0.6;} 50%{opacity:0.5;stroke-width:0.8;} }
    .range-ring { animation: ringPulse 3s ease-in-out infinite; }
    .outer-ring { animation: ringPulse 4s ease-in-out infinite; }
  </style>
