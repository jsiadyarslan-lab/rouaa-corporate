    @keyframes pulse { 0%,100%{r:3.5;opacity:0.6;} 50%{r:5.5;opacity:1;} }
    @keyframes glowPulse { 0%,100%{opacity:0.2;r:8;} 50%{opacity:0.55;r:13;} }
    .node { animation: pulse 2.5s ease-in-out infinite; }
    .node-halo { animation: glowPulse 2.5s ease-in-out infinite; }
    .n0{animation-delay:0s} .n1{animation-delay:0.25s} .n2{animation-delay:0.5s} .n3{animation-delay:0.75s} .n4{animation-delay:1.0s}
