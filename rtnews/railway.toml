# ─── V420: Pipeline Guardian V2 — الحارس الذكي ──────────────────
# OODA Loop: Observe → Orient → Decide → Act → Learn
# Monitors all 5 locales (AR, EN, FR, TR, ES) every 2 minutes.
# Auto-detects: stuck articles, zero publish rates, language threshold mismatches,
#   imaged↔analyzed loops, content length issues, error spikes.
# Auto-fixes with safe escalation: L1 (retry) → L2 (reset) → L3 (threshold) → L4 (code fix) → L5 (full restart)
# Sends Telegram alerts for critical/dead locales (throttled 15 min).
# NEVER sets isReady=true — guardian preserves publish safety.
# CRITICAL: Without this cron, the Guardian OODA loop never runs,
#   meaning pipeline issues go undetected and unfixed.

# 29. GUARDIAN OODA CYCLE: Every 2 minutes
#     Runs the full OODA loop: Observe (collect snapshots) → Orient (analyze root causes)
#     → Decide (select fixes) → Act (execute remediation) → Learn (record outcomes)
#     Auto-fixes critical issues, sends Telegram alerts when pipelines are dead/critical.
[[cron]]
schedule = "*/2 * * * *"
command = "for i in 1 2 3; do curl -sf -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/cron/guardian\" -o /dev/null && break; sleep 5; done || true"

# 30. GUARDIAN LIFECYCLE RECOVERY: Every 5 minutes
#     Recovers stuck articles (stuck >5 minutes at any stage).
#     Resets them back to 'fetched' with incremented retryCount.
#     Articles with retryCount ≥ 15 are marked as 'skipped' (permanently archived).
#     Complements the OODA cycle which handles systemic issues.
[[cron]]
schedule = "*/5 * * * *"
command = "for i in 1 2 3; do curl -sf -X POST -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/guardian/lifecycle\" -o /dev/null && break; sleep 5; done || true"

# 31. AI NEWS WRITER: Every 30 minutes
#     Generates original financial news from platform data (reports, analyses, geo risks, stocks, signals)
#     For all 5 languages (ar/en/fr/tr/es)
#     Max 5 news/day per language, anti-duplication, anti-hallucination
[[cron]]
schedule = "*/30 * * * *"
command = "for i in 1 2 3; do curl -sf \"http://localhost:${PORT:-8080}/api/news/cron-ai?key=ai-news-cron\" -o /dev/null && break; sleep 5; done || true"

# 32. NEWS AGENCY: Every 10 minutes
#     Independent agency service that fetches from official sources + DB,
#     writes original Arabic articles, generates AI images, publishes directly.
#     Max 10/hour, self-throttling, dedup, cleanup.
[[cron]]
schedule = "*/10 * * * *"
command = "curl -sf --max-time 5 \"http://localhost:${PORT:-8080}/api/agency-cron?key=ai-news-cron\" -o /dev/null || true"
