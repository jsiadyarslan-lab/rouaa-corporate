# ─── V146: Telegram Notification Crons ──────────────────────────
# These crons ensure Telegram subscribers receive notifications automatically.
# Without them, the /api/cron/telegram-notifications endpoint was NEVER triggered,
# meaning subscribers never received any notifications despite being subscribed.

# 14. TELEGRAM BREAKING NEWS: Every 5 minutes
#     Sends breaking news notifications to subscribers for newly published articles.
#     The in-memory notifiedIds map prevents duplicate notifications.
[[cron]]
schedule = "*/5 * * * *"
command = "for i in 1 2 3; do curl -sf -X POST -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/cron/telegram-notifications?action=breaking\" -o /dev/null && break; sleep 5; done || true"

# 15. TELEGRAM ALL NEWS: Every 10 minutes
#     Sends both breaking + analysis notifications (catches all newly published articles).
#     V213: Now also includes channel catch-up — publishes to @rouatradingnews any articles
#     that were missed by the publisher (e.g., low-impact articles).
[[cron]]
schedule = "*/10 * * * *"
command = "for i in 1 2 3; do curl -sf -X POST -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/cron/telegram-notifications?action=all\" -o /dev/null && break; sleep 5; done || true"

# 15b. V213: TELEGRAM CHANNEL CATCH-UP: Every 5 minutes
#     Safety net — publishes recently published articles to @rouatradingnews channel
#     that were missed by the publisher (e.g., low-impact articles that were previously
#     excluded from channel publishing, or publisher failures).
#     Uses in-memory dedup to avoid duplicate messages.
[[cron]]
schedule = "*/5 * * * *"
command = "for i in 1 2 3; do curl -sf -X POST -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/cron/telegram-notifications?action=channel_catchup\" -o /dev/null && break; sleep 5; done || true"

