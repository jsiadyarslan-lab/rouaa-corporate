# ─── Railway Configuration ──────────────────────────────────
# V58: CRITICAL FIX — Added pipeline trigger cron every 5 minutes.
# This is THE fix for "publishing stops when dev stops checking".
# Previously, only unlock (15min) and mark-ready (10min) crons existed.
# When Railway hibernates the container, the in-process setTimeout loop
# and setInterval watchdog BOTH die. Only an external cron can wake it up.
# The trigger cron calls ensureRunning() which detects zombie state and
# force-restarts the pipeline.
#
# V128: GOLDEN RULE #4 — Pipeline NEVER stops.
#   1. healthcheckPath → /api/health (self-healing endpoint)
#   2. restartPolicyType → ALWAYS (never give up on container)
#   3. Cron commands with retry logic
#   4. Added 2-minute health check cron for fastest recovery

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildTimeout = 1800

[deploy]
startCommand = "/app/docker-entrypoint.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
deployTimeout = 1800

# ─── Cron Jobs ──────────────────────────────────────────────
# V58: THREE safety-net crons ensure the pipeline NEVER dies.

# 1. PIPELINE TRIGGER: Every 5 minutes, force-start the pipeline
# THIS IS THE KEY FIX — if the container hibernates, this cron wakes it
# and ensureRunning() detects zombie state and force-restarts.
# Safe to call when already running — ensureRunning() handles that.
# V128: Added retry logic — if server not ready, retry 3 times with 5s delay
[[cron]]
schedule = "*/5 * * * *"
command = "for i in 1 2 3; do curl -sf -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/news/cron?action=trigger\" -o /dev/null && break; sleep 5; done || true"

# 2. UNLOCK: Clear any stale DB locks every 15 minutes (safety net)
# V128: Added retry logic
[[cron]]
schedule = "*/15 * * * *"
command = "for i in 1 2 3; do curl -sf -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/news/cron?action=unlock\" -o /dev/null && break; sleep 5; done || true"

# 3. MARK-READY: Force-mark qualifying articles every 10 minutes (safety net)
# Also auto-starts the orchestrator via ensureRunning() if stale.
# V128: Added retry logic
[[cron]]
schedule = "*/10 * * * *"
command = "for i in 1 2 3; do curl -sf -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/news/cron?action=mark-ready\" -o /dev/null && break; sleep 5; done || true"

# 4. MARKET DATA: Seed indicators on first run, then update prices every hour
# V128: Added retry logic
[[cron]]
schedule = "0 * * * *"
command = "for i in 1 2 3; do curl -sf -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/cron/economic-data?action=update-prices\" -o /dev/null && break; sleep 5; done || true"

# 5. REMOVED (V146): Legacy daily report was redundant with cron #6 (AI daily brief).
# Kept the slot number for clarity but removed the cron job.
# Previously: generate-daily-report at 8 AM UTC via /api/cron/economic-data

