command = "for i in 1 2 3; do curl -sf -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/news/cron?action=archive\" -o /dev/null && break; sleep 5; done || true"

# 12. V128: PIPELINE HEALTH GUARDIAN — Every 2 minutes
#     Hits /api/health which has self-healing logic:
#     - Detects stale pipeline (no articles fetched recently)
#     - Auto-calls ensureRunning() to restart dead/stale orchestrator
#     - Also triggers bootstrap if pipeline is completely dead
#     This is the FASTEST recovery mechanism — max 2 min downtime.
#     GOLDEN RULE #4: Pipeline NEVER stops.
[[cron]]
schedule = "*/2 * * * *"
command = "for i in 1 2 3; do curl -sf -H \"x-internal: ${INTERNAL_SECRET:-$ADMIN_SECRET}\" \"http://localhost:${PORT:-8080}/api/health\" -o /dev/null && break; sleep 5; done || true"

